name: Denní kontrola čapích hnízd

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  check-nests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Kontrola hnízd a odeslání reportu
        env:
          YT_API_KEY: ${{ secrets.YT_API_KEY }}
          NOTIFY_EMAIL: ${{ secrets.NOTIFY_EMAIL }}
        run: node check-nests.js
