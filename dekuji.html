<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Zpráva odeslána | Čapí hnízda online</title>
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <link rel="apple-touch-icon" href="apple-touch-icon.png">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: Tahoma, Geneva, sans-serif;
      background: #e8f2fa;
      color: #2a3a4e;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      text-align: center;
    }
    .card {
      background: white;
      border-radius: 16px;
      padding: 2.5rem 2rem;
      max-width: 480px;
      width: 100%;
      box-shadow: 0 4px 20px rgba(30, 58, 95, 0.12);
    }
    .icon { margin-bottom: 1rem; }
    .icon img { width: 80px; height: 80px; border-radius: 50%; object-fit: cover; box-shadow: 0 2px 10px rgba(30,58,95,0.15); }
    h1 {
      font-size: 1.4rem;
      color: #1e3a5f;
      margin-bottom: 0.5rem;
    }
    p {
      font-size: 0.95rem;
      color: #5a6d82;
      line-height: 1.6;
      margin-bottom: 1.5rem;
    }
    a.btn {
      display: inline-block;
      background: #3a7ebf;
      color: white;
      text-decoration: none;
      padding: 0.7rem 2rem;
      border-radius: 8px;
      font-weight: 700;
      font-family: Tahoma, Geneva, sans-serif;
      font-size: 0.95rem;
      transition: background 0.2s;
    }
    a.btn:hover { background: #5a9fd4; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon"><img src="icon.jpg" alt="Čapí hnízdo"></div>
    <h1>Zpráva byla odeslána!</h1>
    <p>Děkuji za zprávu.</p>
    <a class="btn" href="/">← Zpět na čapí hnízda</a>
  </div>
</body>
</html>
